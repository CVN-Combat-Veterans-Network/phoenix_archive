<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canon 7 Sigil — ⟐</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #020208;
    color: #f0f0f0;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }
  h1 { color: #e8cc80; letter-spacing: 0.2em; font-size: 1.3em; margin-bottom: 6px; text-align: center; }
  .sub { color: #444; font-size: 0.82em; margin-bottom: 40px; text-align: center; }
  canvas { display: block; }
  .laws { margin-top: 28px; display: grid; grid-template-columns: 1fr 1fr; gap: 6px 24px; max-width: 480px; }
  .law { display: flex; gap: 8px; font-size: 0.82em; }
  .ln { color: #4a8fff; width: 42px; flex-shrink: 0; }
  .leq { color: #e8cc80; }
  .footer { margin-top: 28px; text-align: center; color: #333; font-size: 0.75em; }
</style>
</head>
<body>
<h1>CANON 7</h1>
<div class="sub">The Eight Laws ⟐ · Sigil Plate</div>

<canvas id="c" width="380" height="380"></canvas>

<div class="laws">
  <div class="law"><span class="ln">Law 1</span><span class="leq">R = λ · L₀</span></div>
  <div class="law"><span class="ln">Law 2</span><span class="leq">v = G0 / 2πR</span></div>
  <div class="law"><span class="ln">Law 3</span><span class="leq">T ∝ R²</span></div>
  <div class="law"><span class="ln">Law 4</span><span class="leq">r ~ R^(4/5)</span></div>
  <div class="law"><span class="ln">Law 5</span><span class="leq">T_t ~ R^(−7/5)</span></div>
  <div class="law"><span class="ln">Law 6</span><span class="leq">E ~ R^(−2/5)</span></div>
  <div class="law"><span class="ln">Law 7</span><span class="leq">Ma = 2,524,204</span></div>
  <div class="law"><span class="ln">Law 8</span><span class="leq">N=3 · G0=1</span></div>
</div>

<div class="footer">Canon 7 sealed · March 1 2026 · G0=1 · N=3</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 380, H = 380, cx = W/2, cy = H/2;

// Three Borromean rings animation
let frame = 0;

function ring(x, y, rx, ry, rot, color, alpha) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  ctx.beginPath();
  ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
  ctx.strokeStyle = color;
  ctx.globalAlpha = alpha;
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.restore();
}

function drawIdentitySymbol() {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.font = 'bold 44px Courier New';
  ctx.fillStyle = 'rgba(200,168,75,0.9)';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('⟐', 0, 0);
  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  frame++;
  const t = frame * 0.006;

  // Glow
  const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, 120);
  glow.addColorStop(0, 'rgba(74,143,255,0.08)');
  glow.addColorStop(1, 'rgba(74,143,255,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);

  // Three rotating Borromean rings
  ring(cx, cy, 100, 40, t,                 '#4a8fff', 0.7);
  ring(cx, cy, 100, 40, t + Math.PI*2/3,  '#e8cc80', 0.7);
  ring(cx, cy, 100, 40, t + Math.PI*4/3,  '#50d890', 0.7);

  // Electrons on each ring
  [0, Math.PI*2/3, Math.PI*4/3].forEach((offset, i) => {
    const colors = ['#4a8fff', '#e8cc80', '#50d890'];
    const angle = t * 2 + offset;
    const ex = cx + Math.cos(t + offset) * 100 * Math.cos(angle);
    const ey = cy + Math.sin(t + offset) * 40;
    ctx.beginPath();
    ctx.arc(ex, ey, 4, 0, Math.PI * 2);
    ctx.fillStyle = colors[i];
    ctx.globalAlpha = 0.9;
    ctx.fill();
    ctx.globalAlpha = 1;
  });

  drawIdentitySymbol();
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
